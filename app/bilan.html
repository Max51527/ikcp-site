<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audit patrimonial 360° — IKCP</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B2A4A;--navy2:#0E1729;--cream:#FAF8F4;--cream2:#F4EFE7;--gold:#C9A96E;--gold-d:#8B6F3F;--ink:#221E18;--mute:#6B5D52;--line:rgba(139,111,63,.22);--green:#3B7D5E;--terra:#C24722}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;color:var(--ink);background:#EDE6D8;padding:clamp(10px,3vw,30px)}
.bar{max-width:780px;margin:0 auto 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{border:0;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;padding:12px 20px;background:linear-gradient(135deg,#E2C896,var(--gold));color:#20180c}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--navy);font-weight:600;text-decoration:none}
.hint{font-size:12.5px;color:var(--mute)}
.sheet{max-width:780px;margin:0 auto;background:#fff;border-radius:6px;box-shadow:0 20px 50px -30px rgba(27,42,74,.5);padding:clamp(24px,5vw,52px);min-height:1000px}
.cover{border-bottom:2px solid var(--gold);padding-bottom:20px;margin-bottom:26px;display:flex;justify-content:space-between;align-items:flex-end;gap:14px}
.cover .mk{font-family:'Playfair Display',serif;font-size:22px;color:var(--navy);font-weight:600}
.cover .mk em{color:var(--gold-d);font-style:italic}
.cover .meta{text-align:right;font-size:12px;color:var(--mute)}
h1{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(24px,4vw,32px);color:var(--navy);margin-bottom:4px}
.lede{color:var(--mute);font-size:14px;margin-bottom:26px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
.kpi{background:var(--cream2);border:1px solid var(--line);border-radius:11px;padding:14px 16px}
.kpi .l{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-d);font-weight:700}
.kpi .v{font-family:'Playfair Display',serif;font-size:22px;color:var(--navy);margin-top:4px}
.dim{margin-top:30px;border-top:1px solid var(--line);padding-top:8px}
.dimtag{display:inline-block;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding:4px 11px;border-radius:999px;margin-bottom:4px}
.dim.fin .dimtag{background:rgba(184,149,110,.16);color:var(--gold-d)}
.dim.jur .dimtag{background:rgba(27,42,74,.1);color:var(--navy)}
.dim.fis .dimtag{background:rgba(59,125,94,.13);color:var(--green)}
.dim h2{font-family:'Playfair Display',serif;font-weight:600;font-size:20px;color:var(--navy);margin:2px 0 12px}
table{width:100%;border-collapse:collapse;margin:6px 0;font-size:14px}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--mute)}
td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
.barline{height:8px;border-radius:5px;background:var(--cream2);overflow:hidden;margin-top:5px}
.barline>i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--gold),#E2C896)}
.piste{background:var(--cream2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:0 11px 11px 0;padding:13px 16px;margin:10px 0}
.dim.jur .piste{border-left-color:var(--navy)}.dim.fis .piste{border-left-color:var(--green)}
.piste .t{font-weight:700;color:var(--navy);font-size:15px}
.piste .d{font-size:13px;color:var(--mute);margin-top:3px;line-height:1.5}
.piste .ba{display:inline-flex;gap:14px;margin-top:8px;font-size:12.5px}
.piste .ba b{color:var(--navy)}.piste .ba .ap{color:var(--green);font-weight:700}
.alert{background:rgba(194,71,34,.07);border:1px solid rgba(194,71,34,.25);border-left:3px solid var(--terra);border-radius:0 11px 11px 0;padding:11px 15px;margin:10px 0;font-size:13px;color:#7a3017}
.disc{margin-top:26px;padding-top:14px;border-top:1px solid var(--line);font-size:10.5px;color:var(--mute);line-height:1.55}
.cta{margin-top:22px;text-align:center;background:var(--navy);color:var(--cream);border-radius:12px;padding:18px;font-size:14px}
.cta a{color:#E2C896;font-weight:700;text-decoration:none}
.empty{text-align:center;color:var(--mute);padding:40px 10px;line-height:1.7}
.empty a{color:var(--gold-d);font-weight:600}
@media(max-width:560px){.kpis{grid-template-columns:1fr}.cover{flex-direction:column;align-items:flex-start}.cover .meta{text-align:left}.kpi .v{font-size:19px}}
@media print{
  body{background:#fff;padding:0}
  .bar{display:none}
  .sheet{box-shadow:none;max-width:none;border-radius:0;padding:14mm 14mm 18mm;min-height:auto}
  .dim h2{break-after:avoid}.piste,.kpi,table,.alert{break-inside:avoid}
}
</style>
</head>
<body>
<div class="bar">
  <button class="btn" onclick="window.print()">📄 Télécharger en PDF</button>
  <a class="btn ghost" href="/app/patrimoine-pro">← Mon cockpit</a>
  <span class="hint">Astuce : dans la boîte d'impression, choisissez « Enregistrer en PDF ».</span>
</div>

<div class="sheet" id="sheet">
  <div class="cover">
    <div class="mk">MARCEL <em>IA</em></div>
    <div class="meta" id="meta">—</div>
  </div>
  <h1>Audit patrimonial 360°</h1>
  <div class="lede">Votre situation passée au crible sur les trois dimensions — <b>financière</b>, <b>juridique</b>, <b>fiscale</b> — à partir de vos données réelles. Vos leviers prioritaires, en clair.</div>
  <div id="body"><div class="empty">Chargement…</div></div>
</div>

<script src="/protect.js?v=1" defer></script>
<script>
var PAT='https://ikcp-patrimoine.maxime-ead.workers.dev';
var CATS={immobilier:{l:'Immobilier',c:'#1B2A4A'},societe:{l:'Sociétés / professionnel',c:'#8B6F3F'},non_cote:{l:'Investissement non coté',c:'#3F7A3F'},liquidites:{l:'Liquidités',c:'#6B655A'},collection:{l:'Collections & passions',c:'#B8801F'}};
var RDV='https://calendly.com/ikcp-/ensemble-construisons-votre-ikigai-patrimonial';
var DISC="Document établi à titre pédagogique à partir des éléments que vous avez renseignés. Il ne constitue pas un conseil personnalisé au sens de l'art. L.541-1 du Code monétaire et financier, ni une recommandation. Les économies indiquées sont des ordres de grandeur ; toute mise en œuvre nécessite une étude personnalisée formalisée par une lettre de mission. Barèmes 2026. — IKCP · IKIGAÏ Conseil Patrimonial · ORIAS 23001568.";
var PER_PLAFOND=88911, IFI_SEUIL=1300000;
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function eur(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(Math.round(n||0));}
function isImpot(b){return b<=42500?b*0.15:42500*0.15+(b-42500)*0.25;}
function piste(cls,t,d,ba){return '<div class="piste"><div class="t">'+t+'</div>'+(d?'<div class="d">'+d+'</div>':'')+(ba||'')+'</div>';}

function readBiens(){
  try{ for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i);
    if(k && k.indexOf('ikcp_patrimoine_')===0){ var v=JSON.parse(localStorage.getItem(k)||'[]'); if(Array.isArray(v)&&v.length) return v; } } }catch(_){}
  return [];
}
function readSociete(){ try{ return JSON.parse(localStorage.getItem('ikcp_societe')||'null'); }catch(_){ return null; } }
function payloadFromBiens(biens){
  var actifs=[],hasSoc=false;
  biens.forEach(function(b){ var v=(+b.value||0)*100;
    if(b.cat==='immobilier') actifs.push({categorie:'immobilier',valorisation_cents:v});
    else if(b.cat==='societe'){ actifs.push({categorie:'participation',valorisation_cents:v}); hasSoc=true; }
    else if(b.cat==='non_cote') actifs.push({categorie:'participation',valorisation_cents:v});
    else if(b.cat==='liquidites') actifs.push({categorie:'compte',valorisation_cents:v});
    else actifs.push({categorie:'autre',valorisation_cents:v});
  });
  return { personnes:[{role:'dirigeant'}], societes: hasSoc?[{regime_fiscal:'IS',is_holding:0}]:[], actifs:actifs, beneficiaires:[] };
}

function render(biens, soc, data){
  var brut=biens.reduce(function(a,b){return a+(+b.value||0);},0);
  var byCat={}; biens.forEach(function(b){ byCat[b.cat]=(byCat[b.cat]||0)+(+b.value||0); });
  var bilan=(data&&data.bilan)||{};
  var net = bilan.actif_net_cents!=null ? bilan.actif_net_cents/100 : brut;
  var passif = bilan.passif_cents!=null ? bilan.passif_cents/100 : 0;
  var oppo=(data&&data.opportunites)||[];
  var immo=byCat.immobilier||0, socVal=byCat.societe||0, liq=byCat.liquidites||0;

  // ===== KPIs =====
  var html='<div class="kpis">'+
    '<div class="kpi"><div class="l">Actif net</div><div class="v">'+eur(net)+'</div></div>'+
    '<div class="kpi"><div class="l">Actif brut</div><div class="v">'+eur(brut)+'</div></div>'+
    '<div class="kpi"><div class="l">'+(soc&&soc.ca!=null?'CA société'+(soc.annee?' '+soc.annee:''):'Passif')+'</div><div class="v">'+eur(soc&&soc.ca!=null?soc.ca:passif)+'</div></div>'+
  '</div>';

  // ===== 1 · FINANCIER =====
  var rows=Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];}).map(function(cat){
    var meta=CATS[cat]||{l:cat,c:'#6B655A'}; var val=byCat[cat]; var pct=brut?Math.round(val/brut*100):0;
    return '<tr><td><b style="color:'+meta.c+'">●</b> '+esc(meta.l)+'</td><td class="r">'+eur(val)+'</td><td class="r">'+pct+' %<div class="barline"><i style="width:'+pct+'%"></i></div></td></tr>';
  }).join('');
  html+='<div class="dim fin"><span class="dimtag">1 · Financier</span><h2>Composition & équilibre de votre patrimoine</h2>'+
    '<table><thead><tr><th>Poste</th><th class="r">Valeur</th><th class="r">Part</th></tr></thead><tbody>'+rows+'</tbody></table>';
  var topCat=Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];})[0];
  var topShare=brut?Math.round((byCat[topCat]||0)/brut*100):0;
  if(topShare>=50) html+='<div class="alert">⚠ Concentration : '+topShare+' % de votre patrimoine repose sur un seul poste ('+esc((CATS[topCat]||{l:topCat}).l)+'). Diversifier réduit votre risque global.</div>';
  if(liq>0 && brut && liq/brut>0.25) html+=piste('fin','Des liquidités qui dorment','Vos liquidités représentent '+Math.round(liq/brut*100)+' % du patrimoine ('+eur(liq)+'). Au-delà d\'une réserve de précaution, un placement adapté préserve leur valeur face à l\'inflation.');
  html+='</div>';

  // ===== 2 · JURIDIQUE =====
  html+='<div class="dim jur"><span class="dimtag">2 · Juridique</span><h2>Structure, protection & transmission</h2>';
  if(soc && soc.nom){
    html+=piste('jur','Votre structure : '+esc(soc.nom),(soc.forme?esc(soc.forme):'Société')+'. Le choix de structure conditionne votre fiscalité, votre protection et la transmission de l\'entreprise.');
  }
  if(soc || socVal>0){
    var assietteDut = socVal>0?socVal:(soc&&soc.ca?soc.ca:0);
    html+=piste('jur','Pacte Dutreil — transmission des titres',
      'La transmission de vos titres de société peut bénéficier d\'une exonération de <b>75 % de l\'assiette taxable</b> (art. 787 B CGI), sous engagement de conservation.'+(assietteDut>0?' Sur une base de '+eur(assietteDut)+', l\'assiette taxée tomberait à '+eur(assietteDut*0.25)+'.':''));
    html+=piste('jur','Holding (SPFPL / société mère)','Loger vos titres dans une holding permet de remonter la trésorerie en quasi-franchise (régime mère-fille), de réinvestir avant impôt personnel et de préparer la transmission.');
  }
  html+=piste('jur','Régime matrimonial & mandat de protection future','Deux audits souvent oubliés : votre régime matrimonial protège-t-il votre conjoint et l\'entreprise ? Un mandat de protection future sécurise la continuité en cas d\'incapacité.');
  html+='</div>';

  // ===== 3 · FISCAL =====
  html+='<div class="dim fis"><span class="dimtag">3 · Fiscal</span><h2>Pression fiscale & optimisation</h2>';
  if(soc && soc.resultat!=null && soc.resultat>0){
    var is=isImpot(soc.resultat), tx=Math.round(is/soc.resultat*100);
    html+=piste('fis','Impôt sur les sociétés','Sur un résultat de '+eur(soc.resultat)+', l\'IS 2026 ressort à environ '+eur(is)+' (taux effectif ~'+tx+' %, 15 % jusqu\'à 42 500 € puis 25 %).');
  }
  if(soc){
    html+=piste('fis','Arbitrage rémunération / dividendes / holding','La façon de sortir le bénéfice change fortement votre net. L\'écart se chiffre souvent en dizaines de milliers d\'euros par an.',
      '<div class="ba"><span>→ Simulez-le dans <b>Outils</b></span></div>');
  }
  html+=piste('fis','Plan d\'Épargne Retraite (PER)','Vous pouvez déduire jusqu\'à <b>'+eur(PER_PLAFOND)+'</b> de votre revenu imposable 2026 (plafonds des 3 dernières années reportables) — un des rares leviers à effet immédiat.');
  if(immo>=IFI_SEUIL){
    html+='<div class="alert">⚠ IFI : votre immobilier ('+eur(immo)+') dépasse le seuil de '+eur(IFI_SEUIL)+'. Vous êtes assujetti — leviers : démembrement, dette déductible, dons.</div>';
  }
  html+='</div>';

  // ===== Pistes moteur souverain =====
  if(oppo.length){
    html+='<div class="dim"><span class="dimtag" style="background:rgba(139,111,63,.14);color:var(--gold-d)">Synthèse</span><h2>Pistes prioritaires détectées</h2>'+
      oppo.slice(0,6).map(function(o){ return piste('','· '+esc(o.nom||o.strategie_key||'Piste'),o.declencheur?esc(o.declencheur):''); }).join('')+'</div>';
  }

  html+='<div class="cta">Ces leviers méritent une étude adaptée à VOTRE situation. Quel objectif voulez-vous servir en priorité ?<br><a href="/app/marcel?q='+encodeURIComponent('À partir de mon audit 360°, quels sont mes 3 leviers prioritaires et par lequel commencer ?')+'">Continuer avec Marcel →</a></div>';
  html+='<div class="disc">'+esc(DISC)+'</div>';
  document.getElementById('body').innerHTML=html;
}

(function(){
  var biens=readBiens(), soc=readSociete();
  try{ document.getElementById('meta').textContent='Édité le '+new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})+(soc&&soc.nom?' · '+soc.nom:''); }catch(_){}
  if(!biens.length && !soc){
    document.getElementById('body').innerHTML='<div class="empty">Aucune donnée trouvée pour générer votre audit.<br><br>Renseignez votre <b>SIREN</b> (cartographie société) sur le <a href="/app/dashboard.html">Dashboard</a> et votre patrimoine dans le <a href="/app/patrimoine-pro">cockpit</a>, puis revenez ici pour générer votre audit 360° en PDF.</div>';
    return;
  }
  render(biens, soc, null);
  if(biens.length){
    fetch(PAT+'/opportunites/preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payloadFromBiens(biens))})
      .then(function(r){return r.ok?r.json():null;}).then(function(d){ if(d) render(biens,soc,d); }).catch(function(){});
  }
})();
</script>
<script src="/app/js/marcel-float.js" defer></script>
</body>
</html>
