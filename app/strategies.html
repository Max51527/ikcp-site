<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Schémas de stratégie — Marcel IA</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1B2A4A">
<link rel="manifest" href="/app/manifest.json">
<link rel="apple-touch-icon" href="/app/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Marcel">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B2A4A;--navy2:#0E1729;--cream:#FAF8F4;--cream2:#F4EFE7;--gold:#C9A96E;--gold-d:#8B6F3F;--ink:#221E18;--mute:#5F5347;--faint:#8A7E70;--line:#E9E2D6;--green:#2E7D5B;--red:#C0414C}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;color:var(--ink);background:var(--cream);padding:clamp(12px,3vw,30px)}
.wrap{max-width:680px;margin:0 auto}
.hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back{color:var(--faint);text-decoration:none;font-size:13px;border:1px solid var(--line);border-radius:9px;padding:7px 12px}
.logo{font-family:'Playfair Display',serif;font-weight:600;font-size:17px;color:var(--navy)}.logo span{color:var(--gold-d)}
.prem{margin-left:auto;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#20180c;background:linear-gradient(120deg,var(--gold-d),var(--gold));padding:4px 10px;border-radius:999px}
h1{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(23px,4vw,30px);color:var(--navy);margin-bottom:4px}
.lede{color:var(--mute);font-size:14px;margin-bottom:20px;max-width:60ch}
.qlbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-d);font-weight:700;margin-bottom:9px}
.objs{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;margin-bottom:22px}
.obj{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;cursor:pointer;text-align:left;font-family:inherit;transition:.15s}
.obj:hover{border-color:rgba(201,169,110,.5);transform:translateY(-1px)}
.obj.on{border-color:var(--gold);background:linear-gradient(150deg,rgba(184,149,110,.12),transparent)}
.obj .t{font-weight:600;font-size:14px;color:var(--navy)}
.obj .d{font-size:11.5px;color:var(--faint);margin-top:2px}
.panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:0 14px 38px rgba(27,42,74,.07);animation:rise .35s ease both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.snm{font-family:'Playfair Display',serif;font-weight:600;font-size:19px;color:var(--navy)}
.snote{font-size:12.5px;color:var(--mute);margin:4px 0 16px;line-height:1.5}
.sub2{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:16px 0 9px}
.flux{display:flex;align-items:stretch;gap:6px;flex-wrap:wrap}
.fb{flex:1;min-width:120px;background:var(--cream2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--navy);line-height:1.35}
.fb .n{font-size:8.5px;font-weight:700;color:var(--gold-d);letter-spacing:.05em}
.fb.g{background:var(--navy);color:#fff;border-color:var(--navy)}.fb.g .n{color:var(--gold)}
.ctrl{margin:18px 0 14px}
.ctrl label{display:flex;justify-content:space-between;font-size:12.5px;color:var(--mute);margin-bottom:5px}
.ctrl label b{color:var(--navy);font-family:'Playfair Display',serif;font-size:15px}
.ctrl input[type=range]{width:100%;accent-color:var(--gold-d);height:5px}
.ba{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.ba .c{border-radius:12px;padding:14px 16px}
.ba .av{background:#FBEEEF;border:1px solid rgba(192,65,76,.28)}
.ba .ap{background:#EAF3EE;border:1px solid rgba(59,125,94,.3)}
.ba .lab{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.ba .av .lab{color:#B0414C}.ba .ap .lab{color:var(--green)}
.ba .v{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;line-height:1}.ba .av .v{color:#B0414C}.ba .ap .v{color:var(--green)}
.ba .sub{font-size:10.5px;margin-top:3px}.ba .av .sub{color:#7a3017}.ba .ap .sub{color:#2a5f46}
.gain{text-align:center;margin-top:12px;font-size:13px;color:var(--navy)}.gain b{color:var(--green);font-family:'Playfair Display',serif;font-size:18px}
.cta{margin-top:18px;text-align:center;background:var(--navy);color:var(--cream);border-radius:12px;padding:16px;font-size:13.5px;line-height:1.5}
.cta a{color:#E2C896;font-weight:700;text-decoration:none}
.disc{margin-top:14px;font-size:10px;color:var(--faint);line-height:1.5;text-align:center}
.gate{background:#fff;border:1px dashed rgba(184,149,110,.5);border-radius:16px;padding:24px 22px;text-align:center}
.gate h2{font-family:'Playfair Display',serif;font-weight:600;font-size:20px;color:var(--navy);margin-bottom:6px}
.gate p{font-size:13.5px;color:var(--mute);line-height:1.55;max-width:48ch;margin:0 auto 14px}
.gate .btn{display:inline-block;background:linear-gradient(135deg,#E2C896,var(--gold));color:#20180c;font-weight:700;font-size:13.5px;padding:11px 20px;border-radius:11px;text-decoration:none}
.gate .names{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:12px 0 16px}
.gate .nm{font-size:11.5px;color:var(--gold-d);background:rgba(184,149,110,.1);border:1px solid rgba(184,149,110,.28);border-radius:999px;padding:5px 11px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd"><span class="logo">Marcel <span>IA</span></span><a class="back" href="/app/dashboard.html">← Mon espace</a><span class="prem">Premium</span></div>
  <h1>Schémas de stratégie</h1>
  <div class="lede">Choisissez votre objectif — Marcel construit le schéma adapté : le montage, étape par étape, et son impact chiffré.</div>
  <div id="root"></div>
</div>

<script src="/protect.js?v=1" defer></script>
<script src="/app/js/marcel-float.js" defer></script>
<script>
var PREMIUM = /^(premium|fo)$/.test((function(){try{return localStorage.getItem('ikcp_tier')||'free';}catch(_){return 'free';}})());
function eur(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0,notation:(Math.abs(n)>=1e6?'compact':'standard')}).format(Math.max(0,Math.round(n)));}
function droits(base){ base=Math.max(0,base); var t=[[8072,.05],[12109,.10],[15932,.15],[552324,.20],[902838,.30],[1805677,.40],[Infinity,.45]]; var d=0,prev=0; for(var i=0;i<t.length;i++){ if(base>prev){ d+=(Math.min(base,t[i][0])-prev)*t[i][1]; prev=t[i][0]; } else break; } return d; }
var ABATT=100000;

var STRATS={
  vendre:{
    nm:'Apport-cession (art. 150-0 B ter)',
    note:"Avant la vente, vous apportez vos titres à une holding que vous contrôlez : la plus-value est mise en report d'imposition. La holding vend, puis réinvestit — l'impôt reste différé tant que 60 % du produit est réinvesti dans une activité éligible sous 2 ans.",
    flux:['Vous détenez vos titres','Apport à votre holding','La holding cède les titres',"Réinvestir 60 % (report d'impôt)"],
    slider:{lbl:'Plus-value de cession',min:200000,max:5000000,step:100000,val:1000000},
    calc:function(pv){ var sans=pv*0.30; return {sans:sans, avecLbl:'différé', sansSub:'PFU 30 % immédiat', apSub:'impôt reporté, capital réinvesti', gain:sans, gainLbl:'capital qui continue de travailler'}; }
  },
  transmettre:{
    nm:'Pacte Dutreil (art. 787 B)',
    note:"En contrepartie d'engagements de conservation (collectif 2 ans + individuel 4 ans) et d'une fonction de direction, la valeur transmise bénéficie d'un abattement de 75 % avant calcul des droits. Donation à 2 enfants.",
    flux:['Vous dirigez la société','Engagement collectif (2 ans)',"Donation des titres (−75 % d'assiette)",'Engagement individuel (4 ans)'],
    slider:{lbl:'Valeur de la société',min:500000,max:10000000,step:250000,val:2000000},
    calc:function(v){ var N=2; var sans=N*droits(Math.max(0,v/N-ABATT)); var avec=N*droits(Math.max(0,(v*0.25)/N-ABATT)); return {sans:sans, avec:avec, sansSub:'droits pleins (2 enfants)', apSub:'assiette réduite à 25 %', gain:sans-avec, gainLbl:'droits économisés'}; }
  },
  tresorerie:{
    nm:'Holding / SPFPL (régime mère-fille)',
    note:"Plutôt que de sortir les dividendes en direct (flat tax 30 %), vous les faites remonter vers une holding : sous le régime mère-fille, seule une quote-part de 5 % est taxée à l'IS (~1,25 % effectif). Le capital reste disponible pour réinvestir, l'impôt personnel est différé.",
    flux:['Société opérationnelle','Remontée des dividendes',"Holding : quote-part 5 % à l'IS",'Réinvestir avant impôt perso'],
    slider:{lbl:'Dividendes remontés',min:50000,max:1000000,step:50000,val:200000},
    calc:function(d){ var sans=d*0.30; var avec=d*0.05*0.25; return {sans:sans, avec:avec, sansSub:'flat tax 30 % (perso)', apSub:'~1,25 % effectif (mère-fille)', gain:sans-avec, gainLbl:'capital qui reste à investir'}; }
  },
  remuneration:{
    nm:'Arbitrage rémunération / dividendes',
    note:"La façon de sortir votre bénéfice (rémunération en BNC/cotisations vs dividendes IS + PFU vs remontée en holding) change fortement votre net. L'outil dédié chiffre les 3 scénarios sur vos curseurs.",
    flux:['Bénéfice de la société','Rémunération · dividendes · holding','Comparer le net en poche','Choisir le bon mix'],
    slider:null,
    cta:{txt:'Chiffrer mes 3 scénarios',href:'/app/simulateur-sel'}
  }
};

function renderInto(key){
  var s=STRATS[key];
  document.querySelectorAll('.obj').forEach(function(o){o.classList.toggle('on',o.getAttribute('data-k')===key);});
  var flux=s.flux.map(function(step,i){ return '<div class="fb'+(i===0?' g':'')+'"><div class="n">Étape '+(i+1)+'</div>'+step+'</div>'; }).join('');
  var html='<div class="panel"><div class="snm">'+s.nm+'</div><div class="snote">'+s.note+'</div>'+
    '<div class="sub2">Le montage, étape par étape</div><div class="flux">'+flux+'</div>';
  if(s.slider){
    html+='<div class="ctrl"><label>'+s.slider.lbl+' <b id="sv">'+eur(s.slider.val)+'</b></label><input type="range" id="srange" min="'+s.slider.min+'" max="'+s.slider.max+'" step="'+s.slider.step+'" value="'+s.slider.val+'"></div>'+
      '<div class="sub2">Avant / après — l\'impact chiffré</div><div id="baOut"></div>';
  }
  if(s.cta){ html+='<div class="cta">Cet arbitrage se chiffre sur VOS montants.<br><a href="'+s.cta.href+'">'+s.cta.txt+' →</a></div>'; }
  else { html+='<div class="cta">Ce schéma mérite une étude adaptée à VOTRE situation. Lequel de ces leviers sert votre objectif prioritaire ?<br><a href="/app/marcel?q='+encodeURIComponent('Explique-moi le montage '+s.nm+' pour ma situation et les conditions à respecter.')+'">Approfondir avec Marcel →</a></div>'; }
  html+='<div class="disc">Schéma pédagogique — ne constitue pas un conseil personnalisé (art. L.541-1 CoMoFi). Économies = ordres de grandeur, barèmes 2026, sous conditions ; toute mise en œuvre nécessite une étude formalisée (lettre de mission · cadre CIF · ORIAS 23001568).</div></div>';
  document.getElementById('panelHost').innerHTML=html;
  if(s.slider){
    var rg=document.getElementById('srange');
    var paint=function(){ var v=+rg.value; document.getElementById('sv').textContent=eur(v); var r=s.calc(v);
      document.getElementById('baOut').innerHTML='<div class="ba"><div class="c av"><div class="lab">Sans le montage</div><div class="v">'+eur(r.sans)+'</div><div class="sub">'+r.sansSub+'</div></div><div class="c ap"><div class="lab">Avec le montage</div><div class="v">'+(r.avecLbl||eur(r.avec))+'</div><div class="sub">'+r.apSub+'</div></div></div><div class="gain">'+r.gainLbl+' : <b>'+eur(r.gain)+'</b></div>'; };
    rg.addEventListener('input',paint); paint();
  }
}

(function(){
  var root=document.getElementById('root');
  if(!PREMIUM){
    root.innerHTML='<div class="gate"><h2>🔒 Réservé à Premium</h2><p>Les schémas de stratégie construisent, pour VOTRE situation, le montage étape par étape et son impact chiffré.</p><div class="names"><span class="nm">Apport-cession</span><span class="nm">Pacte Dutreil</span><span class="nm">Holding / SPFPL</span><span class="nm">Arbitrage rémunération</span></div><a class="btn" href="/app/profil.html">Passer en Premium →</a></div>';
    return;
  }
  root.innerHTML='<div class="qlbl">Votre objectif</div><div class="objs">'+
    '<button class="obj" data-k="vendre"><div class="t">Vendre ma société</div><div class="d">Différer l\'impôt de plus-value</div></button>'+
    '<button class="obj" data-k="transmettre"><div class="t">Transmettre</div><div class="d">Réduire les droits (Dutreil)</div></button>'+
    '<button class="obj" data-k="tresorerie"><div class="t">Réinvestir ma trésorerie</div><div class="d">Holding / SPFPL</div></button>'+
    '<button class="obj" data-k="remuneration"><div class="t">Arbitrer ma rémunération</div><div class="d">Rému / dividendes / holding</div></button>'+
    '</div><div id="panelHost"></div>';
  document.querySelectorAll('.obj').forEach(function(b){ b.onclick=function(){ renderInto(b.getAttribute('data-k')); }; });
  renderInto('vendre');
})();
</script>
</body>
</html>
