<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IKCP Family Office</title>
<meta name="theme-color" content="#0a0d0b">
<style>
  html, body { margin: 0; padding: 0; height: 100vh; background: #0a0d0b; color: #f4ece1;
               font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               display: flex; align-items: center; justify-content: center; }
  .brand { font-family: 'Playfair Display', serif; font-size: 32px; letter-spacing: 0.16em;
           color: #c4a273; }
  .sub { font-size: 11px; letter-spacing: 0.32em; color: #524d47;
         text-transform: uppercase; margin-top: 8px; text-align: center; }
  .spinner { width: 24px; height: 24px; border: 2px solid #524d47;
             border-top-color: #c4a273; border-radius: 50%;
             animation: spin 1s linear infinite; margin: 24px auto 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<!--
  Splash de bootstrap Capacitor. La vraie app est chargée depuis
  https://client.ikcp.eu (cf capacitor.config.ts → server.url).
  Ce fichier est juste un fallback si l'app passe en mode offline.
-->
<div>
  <div class="brand" style="text-align:center;">IKCP<span style="color:#c4a273;">.</span></div>
  <div class="sub">Family Office</div>
  <div class="spinner"></div>
</div>
<script>
  // Si le serveur distant ne répond pas (mode offline), proposer un retry
  setTimeout(function() {
    if (!navigator.onLine) {
      document.querySelector('.spinner').style.display = 'none';
      document.querySelector('.sub').textContent = 'Hors connexion — vérifiez votre réseau';
    }
  }, 8000);
</script>
</body>
</html>
