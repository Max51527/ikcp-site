name: Deploy IKCP Site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'workers/**'
      - 'docs/**'
      - '_archive/**'
      - '*.md'

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version + service workers (propagation auto, anti-JS-périmé)
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "{\"sha\":\"$SHA\",\"deployed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"ref\":\"$GITHUB_REF_NAME\",\"run\":\"$GITHUB_RUN_NUMBER\"}" > version.json
          cat version.json
          # Stampe la version des service workers avec le SHA → SW unique à chaque déploiement
          # → réinstallation + rechargement automatique des membres (élimine le JS périmé).
          if [ -f app/sw.js ]; then sed -i "s/const CACHE_VERSION = '[^']*'/const CACHE_VERSION = 'marcel-$SHA'/" app/sw.js; grep -n "CACHE_VERSION =" app/sw.js | head -1; fi
          if [ -f sw.js ]; then sed -i "s/const CACHE_NAME = '[^']*'/const CACHE_NAME = 'ikcp-$SHA'/" sw.js; grep -n "CACHE_NAME =" sw.js | head -1; fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: eaddc4cc77d99dd397a62e5d5a1b6864
          command: pages deploy . --project-name ikcp-eu --branch=main --commit-dirty=true
