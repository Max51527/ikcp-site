name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/ikcp-marcel/**'
      - 'workers/ikcp-voice/**'
      - 'workers/ikcp-batisseur/**'
      - 'workers/ikcp-codex/**'
      - 'workers/ikcp-hermes/**'
      - 'workers/ikcp-veille/**'
      - 'workers/ikcp-lifestyle/**'
      - 'workers/ikcp-client/**'
      - 'workers/ikcp-pappers/**'
      - 'workers/ikcp-powens/**'
      - 'workers/ikcp-cms-auth/**'
      - 'workers/ikcp-feedback/**'
      - 'workers/ikcp-patrimoine/**'
      - 'workers/ikcp-rag/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Worker à déployer'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ikcp-marcel
          - ikcp-voice
          - ikcp-batisseur
          - ikcp-codex
          - ikcp-hermes
          - ikcp-veille
          - ikcp-lifestyle
          - ikcp-client
          - ikcp-pappers
          - ikcp-powens
          - ikcp-cms-auth
          - ikcp-feedback
          - ikcp-patrimoine
          - ikcp-rag

jobs:
  deploy-ikcp-marcel:
    name: Deploy ikcp-chat (Marcel)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'ikcp-marcel') ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ikcp-chat (Marcel chef d'orchestre)
        uses: cloudflare/wrangler-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: eaddc4cc77d99dd397a62e5d5a1b6864
          workingDirectory: workers/ikcp-marcel

  deploy-ikcp-voice:
    name: Deploy ikcp-voice (TTS/STT Marcel)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'ikcp-voice') ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ikcp-voice (ElevenLabs + Voxtral)
        uses: cloudflare/wrangler-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: eaddc4cc77d99dd397a62e5d5a1b6864
          workingDirectory: workers/ikcp-voice

  deploy-ikcp-batisseur:
    name: "Deploy ikcp-batisseur (Patrimoine 360\xB0)"
