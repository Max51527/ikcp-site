name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'

jobs:
  deploy-ikcp-prospect:
    name: Deploy ikcp-prospect
    runs-on: ubuntu-latest
    if: contains(github.event.commits[0].modified, 'worker/index.js') || contains(github.event.commits[0].added, 'worker/index.js')
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: '3'
          command: deploy index.js --name ikcp-prospect --compatibility-date 2024-01-01

  # NOTE 2026-05-07 : job retiré.
  # Le Worker `ikcp-marcel` (worker/marcel-proxy.js) a été archivé dans _archive/.
  # Le Marcel canonical est `ikcp-chat` déployé depuis workers/ikcp-marcel/worker.js
  # via `npx wrangler deploy` manuel (cf workers/ikcp-marcel/README.md).
  # Action côté Cloudflare : `npx wrangler delete --name ikcp-marcel` à exécuter
  # une fois confirmé que plus aucun client n'appelle l'ancienne URL.
