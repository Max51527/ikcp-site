# Wrangler config — IKCP Client Portal v2 (espace membre freemium)
#
# Setup en 8 étapes (~15 min) :
#
#  1. npx wrangler login
#
#  2. npx wrangler d1 create ikcp-client-db
#     → copier l'ID dans [[d1_databases]] ci-dessous
#
#  3. npx wrangler kv namespace create CLIENT_KV
#     → copier l'ID dans [[kv_namespaces]] ci-dessous
#
#  4. npx wrangler d1 execute ikcp-client-db --file=schema.sql --remote
#
#  5. Pousser les secrets (un par un) :
#     node -e "console.log(require('crypto').randomBytes(32).toString('hex'))" | npx wrangler secret put JWT_SECRET
#     node -e "console.log(require('crypto').randomBytes(32).toString('hex'))" | npx wrangler secret put CABINET_TOKEN
#     npx wrangler secret put RESEND_API_KEY          # depuis resend.com/api-keys
#     npx wrangler secret put STRIPE_SECRET_KEY       # sk_test_... ou sk_live_...
#     npx wrangler secret put STRIPE_WEBHOOK_SECRET   # whsec_... (après création webhook côté Stripe)
#
#  6. Créer Stripe products :
#       - "IKCP Premium Mensuel" 29€/mois → copier price_xxx
#       - "IKCP Premium Annuel" 290€/an  → copier price_xxx
#     puis remplir [vars] ci-dessous
#
#  7. npx wrangler deploy
#
#  8. Côté Stripe Dashboard, créer le webhook :
#     URL: https://ikcp-client.<sous-domaine>.workers.dev/stripe/webhook
#     Events: checkout.session.completed · customer.subscription.deleted · invoice.payment_failed
#     → récupérer le whsec_... et le pousser à l'étape 5

name = "ikcp-client"
main = "worker.js"
compatibility_date = "2026-05-01"

[[d1_databases]]
binding = "D1"
database_name = "ikcp-client-db"
database_id = "748a736a-4892-4ec9-b43b-877ea0296b3d"

[[kv_namespaces]]
binding = "CLIENT_KV"
id = "88162ad75e474216b61a5fd74470124e"

[vars]
APP_URL = "https://ikcp-client.maxime-ead.workers.dev"  # URL du worker (magic link verify)
FRONT_URL = "https://ikcp.eu"                           # Front-end app (redirections post-auth)
IKCP_PAPPERS_URL = "https://ikcp-pappers.maxime-ead.workers.dev"
STRIPE_PRICE_PREMIUM_MONTHLY = "price_REPLACE_monthly"  # À remplacer après création produit Stripe
STRIPE_PRICE_PREMIUM_YEARLY = "price_REPLACE_yearly"    # À remplacer après création produit Stripe

# Secrets (push via `wrangler secret put`) :
#   JWT_SECRET            HS256 signing 32+ chars
#   RESEND_API_KEY        re_xxx
#   STRIPE_SECRET_KEY     sk_test_... ou sk_live_...
#   STRIPE_WEBHOOK_SECRET whsec_...
#   CABINET_TOKEN         32+ chars random — utilisé par logiciel-gp pour polling

[observability]
enabled = true

# Domaine custom (recommandé) :
# Cloudflare Dashboard → Workers → ikcp-client → Domains → Add → client.ikcp.eu
# Puis DNS → CNAME `client` → `ikcp-client.<sous-domaine>.workers.dev`
