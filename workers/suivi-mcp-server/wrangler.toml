# IKCP Suivi MCP server — deuxième sub-agent IKCP
#
# Sub-agent qui surveille en continu les patrimoines clients et déclenche :
#  · rappels J-8 sur échéances fiscales/patrimoniales (cron daily 7h UTC)
#  · détection drift allocation > 5 pts → arbitrages en attente Maxime (cron monthly)

name = "ikcp-suivi-mcp-server"
main = "worker.js"
compatibility_date = "2026-05-09"

[observability]
enabled = true

# ─── D1 binding (lecture echeances + patrimoine_snapshot, écriture arbitrages + events) ───
# Utilise la même DB que ikcp-client (ikcp-client-db).
[[d1_databases]]
binding = "DB"
database_name = "ikcp-client-db"
database_id = "REMPLACER_PAR_ID_DB"

# ─── Cron triggers ───
# Daily 7h UTC (9h Paris) : check échéances J-8 → email Resend
# Monthly 1er du mois 9h UTC : check drift allocation → arbitrages
[triggers]
crons = ["0 7 * * *", "0 9 1 * *"]

# ─── Variables ───
[vars]
RESEND_FROM = "IKCP <maxime@ikcp.eu>"

# ─── Secrets à pousser via wrangler ───
#   wrangler secret put MCP_SHARED_SECRET   (même valeur que sur ikcp-client + Marcel)
#   wrangler secret put RESEND_API_KEY      (re_xxx... pour envoi rappels)
