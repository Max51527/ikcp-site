name = "ikcp-rag"
main = "worker.js"
compatibility_date = "2026-04-22"
# Les secrets posés au dashboard survivent au déploiement CI (cf. incident Powens).
keep_vars = true

[observability]
enabled = true

[vars]
NOTION_DOC_ID = "6da4ff7ad97b45b5b7af51200303ac1c"   # page Notion « Documentation »

# « Mettre à jour » : POST /ingest à la main, OU un workflow GitHub Actions cron
# (plus fiable que le trigger Worker, qui échoue sur ce compte). À brancher plus tard.

# ── Index Vectorize (créé le 19 juin 2026, dimensions=1024, metric=cosine) ──
[[vectorize]]
binding = "VEC"
index_name = "ikcp-knowledge"

# ── Workers AI : embeddings souverains bge-m3 (multilingue, 1024 dim, ZÉRO clé) ──
# Voie par défaut si MISTRAL_API_KEY absente. Même stack Cloudflare que D1/Vectorize.
[ai]
binding = "AI"

# ── SECRETS (jamais ici) — wrangler secret put OU dashboard ──
#   MISTRAL_API_KEY   (embeddings souverains UE)
#   NOTION_TOKEN      (intégration Notion, PARTAGÉE sur la page Documentation)
#   RAG_ADMIN         (protège POST /ingest)
