name = "ikcp-powens"
main = "worker.js"
compatibility_date = "2026-04-22"
# CRUCIAL : empêche `wrangler deploy` (CI) d'effacer les secrets posés au dashboard.
keep_vars = true

[observability]
enabled = true

# ── Réglages NON secrets (ici OU dans le dashboard Cloudflare) ──
# Décommente et remplace par TON domain une fois le sandbox créé.
[vars]
POWENS_DOMAIN = "marcel-ia-sandbox"   # → https://marcel-ia-sandbox.biapi.pro/2.0
POWENS_CLIENT_ID = "27040630"         # identifiant public OAuth (PAS un secret) → gravé ici = increvable
POWENS_REDIRECT_URI = "https://ikcp-powens.maxime-ead.workers.dev/callback"
POWENS_WEBVIEW = "https://webview.powens.com"

# ── SECRET (JAMAIS dans ce fichier) — dashboard, type Secret ──
# Dashboard Cloudflare → Workers → ikcp-powens → Settings → Variables :
#   POWENS_CLIENT_SECRET   (avec keep_vars=true il SURVIT désormais aux deploys)

# ── Base D1 Paris pour ranger les jetons (à créer une seule fois) ──
#   npx wrangler d1 create ikcp-powens-db --location weur
#   npx wrangler d1 execute ikcp-powens-db --remote --file=schema.sql
#   puis colle l'id renvoyé ci-dessous et décommente le bloc :
[[d1_databases]]
binding = "POWENS_DB"
database_name = "ikcp-powens-db"
database_id = "cca1b8d6-a89c-41f3-8ce7-41dbb4ce754a"
