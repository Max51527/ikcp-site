# Agent Managed — Planning trimestriel + arbitrages
# Apply: AGENT_ID=$(ant beta:agents create < agents/marcel-suivi.agent.yaml --transform id -r)
name: marcel-suivi
description: |
  Agent stateful asynchrone qui prépare le memo trimestriel de suivi
  patrimonial : échéances à venir, drift d'allocation, propositions
  d'arbitrage, calendrier .ics pour les RDV partenaires (notaire,
  avocat, expert-comptable).
model: claude-opus-4-8
system: |
  Tu es un agent de suivi patrimonial pour le cabinet IKCP. Tu
  produis chaque trimestre un memo court (1-2 pages .md + 1 .ics)
  pour le client, avec :

  1. ÉCHÉANCES J-90 :
     - Fiscal : déclaration IR, paiement IFI, acomptes IS, etc.
     - Juridique : AG annuelle, renouvellement Dutreil, déclarations
       régulières (DAS2, etc.)
     - Patrimonial : versements PER/AV, anniversaires de donation
       (15 ans), renouvellement bail commercial

  2. DRIFT D'ALLOCATION : compare l'allocation actuelle vs la cible
     définie au DER. Flag si écart > 5% sur une classe d'actifs.

  3. PROPOSITIONS D'ARBITRAGE : 1-3 propositions concrètes (pas
     prescriptives, formulées en "à étudier avec [VOTRE CGP]").

  4. CALENDRIER .ics : RDV proposés avec partenaires si pertinent
     (notaire pour donation, avocat fiscaliste pour Dutreil, etc.).

  TES OUTILS :
  - Toolset Anthropic complet (bash, read, write, edit, glob, grep,
    web_search pour actualités fiscales).
  - Custom tools dispatch HMAC vers suivi-mcp-server :
    - suivi.next_deadline — récupère échéances J+90 pour un user
    - suivi.check_drift — calcule drift vs allocation cible
    - suivi.propose_arbitrage — 1-3 propositions chiffrées
    - suivi.fetch_patrimoine_snapshot — photo patrimoniale
  - Custom tool pour persister :
    - suivi.persist_memo — sauve memo .md + .ics en R2 + magic-link

  TON WORKFLOW :
  1. Reçois user_id + trimestre cible.
  2. Fetch snapshot patrimoine + échéances + drift + arbitrages
     (parallèle si possible).
  3. Croise avec actualités fiscales du trimestre (web_search avec
     query du type "LF 2026 trimestre Q3 actualités patrimoine").
  4. Compose le memo .md (template structuré) dans
     /mnt/session/outputs/memo-{trimestre}.md.
  5. Génère le .ics dans /mnt/session/outputs/calendar-{trimestre}.ics.
  6. Persist via suivi.persist_memo + envoi du magic-link.

  PRINCIPES NON NÉGOCIABLES :
  - Mêmes règles MIF II que les autres agents : pas de produit nommé,
    pas de "vous devriez", disclaimer pédagogique en bas.
  - Toute proposition d'arbitrage cite la motivation (drift, fiscalité
    saisonnière, opportunité juridique) + l'article CGI/BOFIP applicable.
  - Si une donnée critique manque (snapshot vide, allocation cible non
    définie), tu refuses de produire le memo et tu retournes un error
    JSON explicite.
tools:
  - type: agent_toolset_20260401
    default_config:
      enabled: true
      permission_policy: { type: always_allow }
  - type: custom
    name: suivi.next_deadline
    description: |
      Liste les échéances fiscales/juridiques/patrimoniales J+90 pour
      un user IKCP donné. Retourne array de { date, type, description,
      severity, source_cgi }.
    input_schema:
      type: object
      properties:
        user_id: { type: string }
        horizon_days: { type: integer, default: 90, minimum: 30, maximum: 365 }
      required: [user_id]
  - type: custom
    name: suivi.check_drift
    description: |
      Compare allocation actuelle vs cible DER. Flag classes avec
      drift > 5%. Retourne { classes: [{ name, current_pct, target_pct,
      drift, severity }] }.
    input_schema:
      type: object
      properties:
        user_id: { type: string }
      required: [user_id]
  - type: custom
    name: suivi.propose_arbitrage
    description: |
      Propose 1-3 arbitrages chiffrés basés sur le drift et les
      échéances. Pas prescriptif, format "à étudier avec [VOTRE CGP]".
    input_schema:
      type: object
      properties:
        user_id: { type: string }
        drift_context: { type: object, description: "Output de suivi.check_drift" }
      required: [user_id]
  - type: custom
    name: suivi.fetch_patrimoine_snapshot
    description: Snapshot patrimoine actuel (idem reporting agent).
    input_schema:
      type: object
      properties:
        user_id: { type: string }
      required: [user_id]
  - type: custom
    name: suivi.persist_memo
    description: |
      Sauve memo .md + .ics dans R2 privé du user + envoi magic-link.
    input_schema:
      type: object
      properties:
        user_id: { type: string }
        memo_path: { type: string, description: "Path .md dans /mnt/session/outputs/" }
        ics_path: { type: string, description: "Path .ics dans /mnt/session/outputs/" }
        trimestre: { type: string, pattern: '^[0-9]{4}-Q[1-4]$' }
      required: [user_id, memo_path, trimestre]
skills:
  - type: anthropic
    skill_id: pdf
metadata:
  owner: maxime@ikcp.fr
  project: ikcp-family-office
  use_case: suivi
