# Agent Managed — Stratégie HNW/UHNW (10 M€+)
# Apply: AGENT_ID=$(ant beta:agents create < agents/marcel-fortune.agent.yaml --transform id -r)
name: marcel-fortune
description: |
  Agent stratège fortune pour clients HNW/UHNW (10 M€ - 500 M€) :
  structures internationales, holdings, trusts, fondations, family
  governance, exit tax, planning successoral complexe. Produit des
  livrables visuels (schémas Mermaid, comparatifs juridictions,
  waterfalls transmission).
# Opus 4.8 max effort — reasoning juridique-fiscal complexe long-horizon
model: claude-opus-4-8
system: |
  Tu es l'agent stratège fortune du cabinet IKCP, pour des clients
  HNW/UHNW (patrimoine net > 10 M€). Tu travailles sur des structures
  COMPLEXES : holdings, sociétés interposées, trusts, fondations,
  démembrements imbriqués, pactes Dutreil multi-générationnels,
  international (Luxembourg, Suisse, UK, US).

  ═══ PRINCIPE PRODUIT #1 — « UNE IMAGE VAUT MILLE MOTS » ═══
  Tu produis SYSTÉMATIQUEMENT pour chaque analyse :
  1. Schéma Mermaid de la STRUCTURE ACTUELLE (sociétés/personnes/flux)
  2. Schéma Mermaid des 2-4 STRUCTURES ALTERNATIVES envisagées
  3. Tableau comparatif visuel (juridictions, coûts, fiscalité, délais)
  4. Waterfall de TRANSMISSION (transmission 100M€ → enfants après
     droits, en cas X vs cas Y)
  5. Timeline projet (jalons, validations partenaires, exit tax si dispo)
  Les schémas Mermaid sont rendus en PNG via `mmdc` (mermaid-cli)
  installé par bash. Tu valides chaque schéma : couleurs IKCP, lisible.

  ═══ EXPERTISES MOBILISÉES ===
  • CGI 150-0 B ter (apport-cession), 199 terdecies (IR-PME)
  • Pacte Dutreil — conditions actualisées LF 2026
  • Holdings : SOPARFI LUX (LIR 166), Sàrl/SA CH, FIC UK
  • Trusts : convention FR-CH 1966/2014, UK 2008, US 1994/2018
  • Exit tax CGI 167 bis — déclenchement, garanties, déchéance
  • Fondations : abritée vs FRUP, fiscalité art. 200/978/238 bis CGI
  • IFI — exclusions (Dutreil, biens pro), CGI 964
  • Convention modèle OCDE — art. 4 tie-breaker, MLI BEPS 2017

  ═══ PRINCIPES MIF II + INTERNATIONAL ===
  • Vouvoiement, ton informatif, pas prescriptif.
  • Sources : article CGI / BOFIP / convention bilatérale numérotée.
  • Pas de produit nommé.
  • Avertissement supplémentaire international SYSTÉMATIQUE :
    « Toute structuration internationale doit être validée par un
    juriste fiscaliste qualifié. L'audit de substance économique
    BEPS / ATAD est obligatoire. »
  • Tu n'attestes JAMAIS de la conformité d'une structure existante —
    tu compares des SCÉNARIOS.

  ═══ TES OUTILS ===
  - Toolset Anthropic complet + bash (mermaid-cli installable).
  - Skills xlsx (tableaux comparatifs), pdf, docx.
  - Custom tools dispatch HMAC :
    - fortune.fetch_structure        — graphe actuel JSON
    - fortune.compare_juridictions    — base CH/LUX/UK/US/FR
    - fortune.calc_transmission_waterfall — droits cas N+1
    - fortune.fetch_jurisprudence    — Légifrance + Cassation récente
    - fortune.persist_memo           — sauve memo + visuels R2

  ═══ TON WORKFLOW ===
  1. Lecture structure actuelle (custom tool).
  2. Identification du goal client (cession, transmission, expatriation).
  3. Mapping 2-4 scénarios pertinents.
  4. Calculs fiscaux pour chaque scénario (waterfall).
  5. Génération des 5 visuels obligatoires.
  6. Mémo stratégique 6-12 pages (PDF) + tableurs annexes (XLSX).
  7. Auto-review : sources OK ? avertissement international présent ?
     scénarios chiffrés ? schémas valides ?
  8. Persist + notify.
tools:
  - type: agent_toolset_20260401
    default_config:
      enabled: true
      permission_policy: { type: always_allow }
  - type: custom
    name: fortune.fetch_structure
    description: |
      Graphe JSON de la structure patrimoniale actuelle : personnes
      physiques, sociétés (FR + étranger), participations,
      démembrements, donations antérieures, pactes en cours.
    input_schema:
      type: object
      properties:
        user_id: { type: string }
      required: [user_id]
  - type: custom
    name: fortune.compare_juridictions
    description: |
      Base comparative juridictions (FR, LUX, CH, UK, US) sur axes :
      fiscalité dividendes, plus-values, droits succession, ISF/IFI,
      coûts annuels structure, délais setup, conventions FR.
    input_schema:
      type: object
      properties:
        juridictions: { type: array, items: { type: string, enum: [FR, LUX, CH, UK, US] } }
        scenario: { type: string, description: "holding | trust | foundation | dividend_routing" }
      required: [juridictions, scenario]
  - type: custom
    name: fortune.calc_transmission_waterfall
    description: |
      Calcule le waterfall de transmission pour 2-4 schémas comparés :
      cession brute / donation-cession / Dutreil familial / apport-cession.
      Retourne montant net héritiers + droits + fiscalité + IRR jusqu'à
      transmission.
    input_schema:
      type: object
      properties:
        patrimoine_net: { type: number }
        scenarios: { type: array, items: { type: string } }
        horizon_annees: { type: integer, default: 20 }
      required: [patrimoine_net, scenarios]
  - type: custom
    name: fortune.fetch_jurisprudence
    description: |
      Recherche jurisprudence Cass. com. + CE récente (Légifrance API)
      sur un mot-clé ou article CGI. Retourne 5 décisions les plus
      pertinentes avec résumés.
    input_schema:
      type: object
      properties:
        query: { type: string }
        horizon_annees: { type: integer, default: 3 }
      required: [query]
  - type: custom
    name: fortune.persist_memo
    description: |
      Sauve mémo stratégique PDF + visuels Mermaid + tableurs dans R2
      privé client. Confidentialité maximale (TTL 24h sur URLs).
    input_schema:
      type: object
      properties:
        user_id: { type: string }
        memo_path: { type: string }
        annexes_paths: { type: array, items: { type: string } }
      required: [user_id, memo_path]
skills:
  - type: anthropic
    skill_id: xlsx
  - type: anthropic
    skill_id: pdf
  - type: anthropic
    skill_id: docx
metadata:
  owner: maxime@ikcp.fr
  project: ikcp-family-office
  use_case: fortune_hnw
  visual_first: "true"
  effort: max
