<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page introuvable — Marcel IA · IKCP</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B2A4A;--navy2:#0E1729;--cream:#FAF8F4;--gold:#C9A96E;--gold-d:#8B6F3F;--gold-b:#E2C896;--ink:#221E18;--mute:#6B5D52;--line:rgba(139,111,63,.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.55}
.card{max-width:480px;text-align:center}
.brand{font-family:'Playfair Display',serif;font-weight:600;font-size:19px;color:var(--navy);margin-bottom:28px}
.brand span{color:var(--gold-d)}
.code{font-family:'Playfair Display',serif;font-weight:600;font-size:76px;color:var(--gold-d);line-height:1}
h1{font-family:'Playfair Display',serif;font-weight:600;font-size:24px;color:var(--navy);margin:10px 0 10px}
p{color:var(--mute);font-size:14.5px;margin-bottom:26px}
.cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-block;text-decoration:none;font-weight:700;border-radius:12px;padding:13px 24px;font-size:14.5px;background:linear-gradient(135deg,var(--gold-b),var(--gold));color:#20180c}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--navy)}
</style>
</head>
<body>
<div class="card">
  <div class="brand">Marcel <span>IA</span></div>
  <div class="code">404</div>
  <h1>Cette page n'existe pas</h1>
  <p>Le lien est peut-être obsolète, ou l'adresse comporte une erreur. Voici où repartir.</p>
  <div class="cta">
    <a class="btn" href="/">Accueil →</a>
    <a class="btn ghost" href="/app/dashboard.html">Mon espace →</a>
  </div>
</div>
</body>
</html>
