<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Test Pipeline IKCP</title></head>
<body style="font-family:sans-serif;padding:40px;max-width:600px;margin:0 auto;">
<h2>Test Pipeline Complet — IKCP</h2>
<p>Ce test envoie des données au Worker Cloudflare et vérifie Notion + Email.</p>

<div style="background:#f5f5f5;padding:20px;border-radius:8px;margin:20px 0;">
<div style="margin-bottom:12px;">
<label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">Prénom</label>
<input type="text" id="prenom" value="Maxime TEST" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:15px;">
</div>
<div style="margin-bottom:12px;">
<label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">Email</label>
<input type="email" id="email" value="maxime@ikcp.fr" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:15px;">
</div>
</div>

<button onclick="runTest()" style="padding:14px 28px;font-size:16px;cursor:pointer;background:#1f1a16;color:white;border:none;border-radius:8px;width:100%;">Lancer le test complet</button>

<pre id="log" style="margin-top:20px;padding:20px;background:#f9f6f0;border-radius:8px;font-size:13px;line-height:1.8;white-space:pre-wrap;border:1px solid #e5ded2;">En attente...</pre>

<script>
var log = document.getElementById('log');

async function runTest() {
    log.textContent = '=== TEST PIPELINE IKCP ===\n' + new Date().toLocaleString('fr-FR') + '\n';
    
    var prenom = document.getElementById('prenom').value;
    var email = document.getElementById('email').value;
    
    log.textContent += '\n[1] Envoi au Worker Cloudflare...\n';
    log.textContent += 'URL: https://ikcp-prospect.maxime-ead.workers.dev\n';
    log.textContent += 'Données: prenom=' + prenom + ', email=' + email + '\n';
    
    try {
        var res = await fetch('https://ikcp-prospect.maxime-ead.workers.dev', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                source: 'TEST MANUEL Pipeline',
                prenom: prenom,
                email: email,
                r1: '116 388 \u20ac',
                r2: '28 388 \u20ac',
                eco: '88 000 \u20ac'
            })
        });
        
        log.textContent += 'Status HTTP: ' + res.status + '\n';
        
        var data = await res.json();
        log.textContent += '\nRéponse Worker:\n' + JSON.stringify(data, null, 2) + '\n';
        
        if (data.success) {
            log.textContent += '\n=== RÉSULTATS ===\n';
            log.textContent += 'Notion : ' + (data.notion === 'created' ? '✅ Prospect créé' : '❌ Échec — ' + data.notion) + '\n';
            log.textContent += 'Email  : ' + (data.email === 'sent' ? '✅ Email envoyé à ' + email : data.email === 'skipped' ? '⚠️ Skipped (pas de clé Resend)' : '❌ Échec — ' + data.email) + '\n';
            
            if (data.notion === 'created') {
                log.textContent += '\n✅ Vérifie dans Notion : https://www.notion.so/47283ea3419f4d1b80cade61d7b65791\n';
                log.textContent += 'Tu dois voir un prospect "' + prenom + '" avec email "' + email + '"\n';
            }
            if (data.email === 'sent') {
                log.textContent += '✅ Vérifie ta boîte mail : ' + email + '\n';
            }
            if (data.email === 'skipped') {
                log.textContent += '\n⚠️ Email non envoyé — la clé RESEND_API_KEY n\'est pas configurée dans Cloudflare.\n';
                log.textContent += 'Va dans Cloudflare > Workers > ikcp-prospect > Settings > Variables\n';
                log.textContent += 'Ajoute : RESEND_API_KEY = ta clé Resend (re_...)\n';
            }
        } else {
            log.textContent += '\n❌ ERREUR: ' + (data.error || 'inconnue') + '\n';
        }
    } catch(e) {
        log.textContent += '\n❌ ERREUR RÉSEAU: ' + e.message + '\n';
        log.textContent += '\nLe worker est peut-être inactif.\n';
        log.textContent += 'Vérifie dans Cloudflare > Workers > ikcp-prospect > le statut doit être Active.\n';
    }
    
    log.textContent += '\n=== FIN DU TEST ===';
}
</script>
</body>
</html>
